    <script>
        const qaData = [
            {
                "id": 1,
                "title": "수비수가 실수로 짧게 패스한 볼을 골키퍼가 손으로 잡은 경우",
                "ko_q": "수비수가 상대 공격수의 압박을 받는 상황에서 페널티 에어리어 밖에서 볼을 컨트롤합니다.\n수비수는 자신의 골키퍼를 보고 의도적으로 그쪽으로 볼을 킥합니다.\n볼을 킥하는 동안 수비수가 잔디에 미끄러져 패스가 짧게 전달되었습니다.\n이 루즈볼을 공격수와 골키퍼가 동시에 쫓아갔고, 골키퍼가 페널티 에어리어 안에서 먼저 손으로 볼을 터치했습니다. 이것이 허용됩니까?",
                "en_q": "A defender controls the ball outside their penalty area under pressure from an opposing attacker.\nThe defender looks at their goalkeeper and deliberately kicks the ball towards them.\nWhile kicking the ball, the defender slips on the grass, causing the pass to fall short.\nThe loose ball is then chased by both the attacker and the goalkeeper, and the goalkeeper touches the ball first with their hands inside the penalty area. Is this allowed?",
                "ko_a": "골키퍼는 동료 선수가 의도적으로 킥한 볼에 대해서는, 비록 그 패스 시도가 부정확하거나 실패했더라도 자신의 페널티 에어리어 안에서 손으로 볼을 다루는 것이 허용되지 않습니다.\n주심은 플레이를 중단시키고 상대팀에게 간접 프리킥을 부여합니다.\n골키퍼에게 별도의 징계 조치는 내려지지 않습니다.",
                "en_a": "The goalkeeper is not permitted to handle the ball inside their penalty area after it has been deliberately kicked to them by a team-mate, even if the attempted pass is inaccurate or unsuccessful.\nThe referee stops play and awards an indirect free kick to the opposing team.\nNo disciplinary sanction is taken against the goalkeeper.",
                "key_point": "경기규칙 제12조에 따라 골키퍼가 동료 선수에 의해 의도적으로 킥된 볼을 자신의 페널티 에어리어 안에서 손/팔로 터치하면 상대팀에게 간접 프리킥이 주어집니다."
            },
            {
                "id": 2,
                "title": "골키퍼가 잡으려다 실수로 떨어뜨린 볼을 다시 잡은 경우",
                "ko_q": "골키퍼가 자신의 페널티 에어리어 안에서 볼을 잡기 위해 점프하여 상대의 도전 없이 볼을 잡았습니다.\n하지만 볼이 실수로 골키퍼의 손에서 빠져나가 발치 지면으로 떨어졌습니다.\n공격수가 볼을 향해 달려갔으나, 공격수가 도달하기 전에 골키퍼가 페널티 에어리어 안에서 볼을 다시 집어 들었습니다. 올바른 판정은 무엇입니까?",
                "en_q": "A goalkeeper jumps for the ball inside their penalty area and catches it without being challenged by any opponent; however, the ball accidentally slips out of the goalkeeper’s hands and falls to the ground at their feet.\nAn attacker runs towards the ball, but the goalkeeper picks it up inside the penalty area before the attacker can reach it. What is the correct decision?",
                "ko_a": "골키퍼가 파울을 당하지 않았다면 주심은 플레이를 계속하도록 허용합니다.\n볼을 잡으려다 실패한 시도는 볼을 방출한 것으로 간주되지 않으므로, 골키퍼는 다른 선수가 터치하기 전에 볼을 두 번째로 손으로 다룰 수 있습니다 (간접 프리킥 반칙이 아님).",
                "en_a": "Provided that the goalkeeper is not fouled, the referee allows play to continue.\nThe unsuccessful attempt to hold the ball is not considered to be releasing the ball, so the goalkeeper may handle the ball a second time before it has touched another player (no indirect free kick offence).",

                "en_q": "When the ball is slowly heading out for a corner kick, an attacking team player picks it up with their hands while it is still on the field of play, close to the goal line.\nWhat is the correct decision if no other player has the opportunity to touch the ball before it leaves the field?",

                "en_a": "The referee awards a direct free kick to the defending team because the attacking player deliberately handled the ball while it was still in play; the player is not cautioned.",

            {
                "id": 4,
                "title": "수비수의 패스 실수를 골키퍼가 손으로 잡았을 때",

                "en_q": "A midfielder (Team A) passes the ball with their foot to a defender (Team A), who fails to play the ball while under pressure from an attacker (Team B).\nThe ball then enters Team A’s penalty area and is picked up by the goalkeeper (Team A). What is the correct decision?",
                "ko_a": "주심은 플레이를 계속하도록 허용합니다. 이는 골키퍼에게 의도적으로 킥한 패스가 아니기 때문입니다.",
                "en_a": "The referee allows play to continue as this was not a deliberate kick to the goalkeeper.",
                "key_point": "골키퍼의 핸들링 제한은 동료 선수가 골키퍼에게 '의도적으로 킥한' 볼에만 적용됩니다. 수비수를 향한 패스가 굴절되거나 전달 과정의 실수로 골키퍼에게 간 경우는 해당하지 않습니다."
            },
            {
                "id": 5,

                "ko_q": "수비수가 자신의 골문을 향한 상태에서 발로 볼을 컨트롤하다가 뒤에서 다가오는 상대 공격수를 인지했습니다.\n수비수는 상대 선수를 상대로 정당하게 볼을 보호(실딩)했으며, 두 선수 모두 볼을 터치하지 않은 상태에서 골키퍼가 페널티 에어리어 안에서 볼을 집어 들었습니다. 올바른 판정은 무엇입니까?",
                "en_q": "A defender controls the ball with the foot while facing their own goal and then notices an opposing attacker approaching from behind.\nThe defender legally shields the ball from the opponent, and neither player touches the ball until it is picked up by the goalkeeper inside their penalty area. What is the correct decision?",
                "ko_a": "주심은 플레이를 계속하도록 허용합니다. 이는 골키퍼에게 의도적으로 킥한 볼이 아니기 때문입니다.",
                "en_a": "The referee allows play to continue as this was not a deliberate kick to the goalkeeper.",
                "key_point": "수비수가 볼을 건드리지 않고 몸으로 보호하며 골키퍼에게 흘려보내는 행위는 '의도적으로 킥한' 것이 아니므로 골키퍼가 손으로 잡아도 반칙이 아닙니다."
            },
            {
                "id": 6,
                "title": "백패스 실수를 골키퍼가 차내려다 실패한 후 손으로 막은 경우",
                "ko_q": "볼이 인플레이 상황일 때, 선수가 자신의 골키퍼에게 의도적으로 볼을 킥했습니다. 골키퍼가 볼을 다시 인플레이 상황으로 차내려고 시도했으나 실패했습니다.\n볼이 골키퍼의 발에 맞고 비어 있는 골문을 향해 뒤로 흘러갔습니다.\n골키퍼는 볼을 쫓아가 손으로 터치하여 골문으로 들어가는 것을 막았습니다. 올바른 판정은 무엇입니까?",
                "en_q": "While the ball is in play, a player deliberately kicks the ball to their goalkeeper, who attempts unsuccessfully to kick it into play.\nThe ball touches the goalkeeper’s foot but goes backwards towards the empty goal.\nThe goalkeeper then chases the ball and touches it with their hands, preventing it from entering the goal. What is the correct decision?",
                "ko_a": "골키퍼가 명백하게 볼을 킥하려고 시도했으므로, 그 이후에 볼을 손으로 다룬 것은 반칙이 아닙니다. 주심은 플레이를 계속하도록 허용합니다.",
                "en_a": "As the goalkeeper clearly attempted to kick the ball, it was not an offence when they handled the ball afterwards. The referee allows play to continue.",
                "key_point": "경기규칙 제12조의 개정된 내용에 따르면, 골키퍼가 동료의 백패스를 다시 플레이하기 위해 명백히 킥했거나 킥하려고 시도한 이후에는, 그 시도가 실패하더라도 손으로 볼을 터치하는 것이 허용됩니다."
            },
            {
                "id": 7,
                "title": "골키퍼가 세이브한 뒤 리바운드된 볼을 다시 잡은 경우",
                "ko_q": "골키퍼가 자신의 페널티 에어리어 안에서 손으로 볼을 쳐내어 슛을 세이브했습니다.\n그 결과 볼은 몇 미터 튕겨 나갔으나 경기장 안에 남아있었습니다.\n골키퍼는 볼을 향해 달려가 다른 선수가 터치하기 전에 페널티 에어리어 안에서 볼을 잡았습니다. 올바른 판정은 무엇입니까?",
                "en_q": "A goalkeeper saves a shot inside their penalty area by parrying the ball with their hands.\nAs a result, the ball bounces a few metres away and remains on the field of play.\nThe goalkeeper then runs towards the ball and catches it inside the penalty area before it has touched another player. What is the correct decision?",
                "ko_a": "주심은 플레이를 계속하도록 허용합니다.\n골키퍼가 세이브를 하거나 골키퍼에게 맞고 튀어나온(리바운드된) 볼은 골키퍼가 손/팔로 볼을 컨트롤한 것으로 간주되지 않으므로, 반칙 없이 두 번째로 볼을 손으로 다룰 수 있습니다.",
                "en_a": "The referee allows play to continue.\nA goalkeeper is not considered to be in control of the ball with their hand(s) if the ball rebounds from the goalkeeper or the goalkeeper has made a save, so they may handle the ball a second time without committing an offence.",
                "key_point": "세이브 과정에서 볼을 쳐낸 것은 경기규칙상 '소유'나 '컨트롤'로 보지 않기에 이후에 다시 잡는 행위는 재차 터치 반칙이 아닙니다."
            },
            // ... All other items will be added here in the same format
            {
                "id": 8,
                "title": "백패스 컨트롤 실수 후 골키퍼가 다시 잡은 경우",
                "ko_q": "수비수가 자신의 골키퍼에게 의도적으로 볼을 킥했고, 골키퍼는 그 패스를 컨트롤하려 시도했습니다(볼을 걷어내려는 시도는 없었음).\n볼이 골키퍼의 발/다리에 맞고 튀어나온 뒤, 골키퍼는 잔디에 미끄러졌으나 다가오는 상대 선수보다 먼저 페널티 에어리어 안에서 볼을 잡았습니다.\n올바른 판정은 무엇입니까?",
                "en_q": "A defender deliberately kicks the ball to their goalkeeper who tries to control the pass (no attempt to clear the ball).\nAfter the ball rebounds from their foot/leg, the goalkeeper slips on the grass and then catches the ball inside their penalty area, ahead of an approaching opponent.\nWhat is the correct decision?",
                "ko_a": "골키퍼는 동료 선수가 의도적으로 킥한 볼에 대해, '볼을 인플레이로 방출하기 위해 명백히 킥했거나 킥하려고 시도한' 경우가 아니라면 손/팔로 터치할 수 없습니다. 이 상황에서는 그런 시도가 없었습니다.\n따라서 플레이는 중단되며 공격팀의 간접 프리킥으로 재개됩니다. 골키퍼에 대한 별도의 징계 조치는 없습니다.",

            {
                "id": 9,

                "ko_a": "골키퍼가 손으로 볼을 컨트롤할 때 상대 선수는 도전할 수 없습니다.\n플레이는 간접 프리킥(접촉이 없는 경우) 또는 직접 프리킥(접촉이 있는 경우)으로 재개됩니다.\n유망한 공격을 저지하거나 도전이 무모했다면 경고(옐로카드)를 줄 수 있습니다.",
                "en_a": "A goalkeeper cannot be challenged by an opponent when in control of the ball with the hand(s).\nPlay restarts with an indirect free kick (no contact) or a direct free kick (contact) – the offence is a caution (yellow card, YC) if it stops a promising attack or the challenge is reckless.",
                "key_point": "골키퍼가 펼친 손바닥에 볼을 올려두고 있는 상태도 볼을 컨트롤하는 것으로 간주되며, 이 상황에서 상대의 도전은 반칙으로 처벌됩니다."
            }
        ];

        const qaGrid = document.getElementById('qaGrid');

        function createCard(item) {
            return `
                <div class="qa-card bg-slate-800/60 backdrop-blur-sm border border-slate-700 rounded-lg p-5 shadow-lg shadow-black/20 transition-all duration-300 hover:border-cyan-400 hover:shadow-cyan-500/20 hover:-translate-y-1">
                    <div class="card-content">
                        <div class="flex items-start gap-4">
                            <span class="text-2xl font-bold text-cyan-400">${item.id}.</span>
                            <h3 class="text-lg font-semibold text-slate-100 flex-1">${item.title}</h3>
                        </div>
                        <p class="mt-4 text-slate-300 whitespace-pre-line">🤔 ${item.ko_q}</p>
                        
                        <button class="toggle-answer-btn mt-4 w-full bg-indigo-600 text-white font-bold py-2 px-4 rounded-md hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-opacity-75 transition-colors flex items-center justify-center gap-2">
                            <span>판정 보기</span>
                            <svg class="w-5 h-5 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>

                        <div class="answer-content hidden mt-6 pt-4 border-t border-slate-600 space-y-4">
                            <div>
                                <h4 class="text-md font-semibold text-green-400 mb-2">✅ 판정 (Korean)</h4>
                                <p class="text-slate-300 whitespace-pre-line">${item.ko_a}</p>
                            </div>
                            <div>
                                <h4 class="text-md font-semibold text-amber-400 mb-2">💡 핵심 포인트</h4>
                                <p class="bg-slate-900/50 p-3 rounded-md border-l-4 border-amber-400 text-slate-200">${item.key_point}</p>
                            </div>
                            <div class="mt-4 pt-4 border-t border-dashed border-slate-600">
                                <h4 class="text-md font-semibold text-sky-400 mb-2">🇬🇧 International Referee Study (English)</h4>
                                <p class="text-slate-400 italic mb-2 whitespace-pre-line">${item.en_q}</p>
                                <p class="text-slate-300 whitespace-pre-line">${item.en_a}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Initial render
        qaGrid.innerHTML = qaData.map(createCard).join('');
        
        // Event Listeners
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('searchInput');
            const searchResult = document.getElementById('searchResult');

            qaGrid.addEventListener('click', (e) => {
                const button = e.target.closest('.toggle-answer-btn');
                if (button) {
                    const answerContent = button.nextElementSibling;
                    const buttonText = button.querySelector('span');
                    const buttonIcon = button.querySelector('svg');

                    const isHidden = answerContent.classList.contains('hidden');
                    
                    if (isHidden) {
                        answerContent.classList.remove('hidden');
                        buttonText.textContent = '판정 숨기기';
                        buttonIcon.style.transform = 'rotate(180deg)';
                    } else {
                        answerContent.classList.add('hidden');
                        buttonText.textContent = '판정 보기';
                        buttonIcon.style.transform = 'rotate(0deg)';
                    }
                }
            });

            searchInput.addEventListener('input', () => {
                const searchTerm = searchInput.value.toLowerCase();
                const cards = qaGrid.querySelectorAll('.qa-card');
                let visibleCount = 0;
                
                cards.forEach(card => {
                    const content = card.querySelector('.card-content').textContent.toLowerCase();
                    if (content.includes(searchTerm)) {
                        card.style.display = 'block';
                        visibleCount++;
                    } else {
                        card.style.display = 'none';
                    }
                });

                if (searchTerm === '') {
                    searchResult.textContent = '';
                } else {
                    searchResult.textContent = `${visibleCount}개의 사례가 검색되었습니다.`;
                }
            });
        });
    </script>

</body>
</html>
